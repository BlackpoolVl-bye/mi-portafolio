<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Portafolio - Dev</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-[#0b1120] text-white font-sans overflow-x-hidden">

    <section class="min-h-screen flex flex-col items-center justify-center p-6 lg:flex-row max-w-6xl mx-auto">
        <div class="flex-1 space-y-6 animate-fade-in">
            <span class="text-green-400 border border-green-400 px-3 py-1 rounded-full text-sm">Disponible para trabajar</span>
            <h1 class="text-5xl font-bold">Andres Orlando <br><span class="text-blue-500">Peña Guzman</span></h1>
            <h2 class="text-xl text-gray-400 font-medium">Desarrollador Jr. Full-Stack</h2>
            <p class="text-gray-300 max-w-lg">
                Desarrollador de software con enfoque Full-Stack. Dominio de soluciones web robustas desde el Backend hasta el Frontend.
            </p>
            
            <div class="flex gap-4">
                <button class="bg-blue-600 hover:bg-blue-700 px-6 py-2 rounded-lg flex items-center gap-2 transition">
                    <i class="fas fa-comment"></i> Contactar
                </button>
                <button class="bg-gray-800 hover:bg-gray-700 px-6 py-2 rounded-lg flex items-center gap-2 transition">
                    <i class="fas fa-envelope"></i> Correo
                </button>
                <button class="bg-gray-800 hover:bg-gray-700 px-6 py-2 rounded-lg flex items-center gap-2 transition">
                    <i class="fab fa-github"></i> GitHub
                </button>
            </div>
        </div>

        <div class="flex-1 mt-12 lg:mt-0 w-full max-w-md bg-[#162033] p-8 rounded-2xl shadow-2xl relative">
            <canvas id="competenciesChart"></canvas>
            <div class="absolute top-4 right-4 rounded-full overflow-hidden w-20 h-20 border-2 border-blue-500">
                <img src="https://via.placeholder.com/150" alt="Profile" class="w-full h-full object-cover">
            </div>
        </div>
    </section>

    <section class="py-20 max-w-6xl mx-auto px-6">
        <h3 class="text-2xl font-bold mb-8 border-b border-gray-700 pb-2">Detalle de Habilidades</h3>
        <div class="flex flex-wrap gap-4 mb-10" id="filter-buttons">
            <button onclick="filterSkills('all')" class="filter-btn active">Todos</button>
            <button onclick="filterSkills('backend')" class="filter-btn">Backend</button>
            <button onclick="filterSkills('frontend')" class="filter-btn">Frontend</button>
            <button onclick="filterSkills('database')" class="filter-btn">Base de Datos</button>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4" id="skills-container">
            <div class="skill-card backend bg-[#1e293b] p-4 rounded-xl flex items-center gap-3">
                <i class="fab fa-node-js text-green-500 text-2xl"></i>
                <span>Node.js</span>
            </div>
            <div class="skill-card frontend bg-[#1e293b] p-4 rounded-xl flex items-center gap-3">
                <i class="fab fa-react text-blue-400 text-2xl"></i>
                <span>React.js</span>
            </div>
            </div>
    </section>

    <script src="assets/js/main.js"></script>
</body>
</html>
